name: Build and Test

on:
  push:
    branches: [ main, 'patch*' ]
    tags: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew classes
        env:
          CAPLIN_USERNAME: ${{ secrets.CAPLIN_USERNAME }}
          CAPLIN_PASSWORD: ${{ secrets.CAPLIN_PASSWORD }}

      - name: Cache build artifacts
        uses: actions/cache@v6
        with:
          path: |
            */build
          key: ${{ github.ref_name }}-build-${{ github.sha }}

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore build artifacts
        uses: actions/cache@v6
        with:
          path: |
            */build
          key: ${{ github.ref_name }}-build-${{ github.sha }}

      - name: Run tests
        run: ./gradlew --continue check koverXmlReport
        env:
          CAPLIN_USERNAME: ${{ secrets.CAPLIN_USERNAME }}
          CAPLIN_PASSWORD: ${{ secrets.CAPLIN_PASSWORD }}

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: |
            reactive/datasource/api/build/test-results/test/TEST-*.xml
            reactive/datasource/core/build/test-results/test/TEST-*.xml
            reactive/datasource/java-flow/build/test-results/test/TEST-*.xml
            reactive/datasource/kotlin/build/test-results/test/TEST-*.xml
            reactive/datasource/reactivestreams/build/test-results/test/TEST-*.xml
            reactive/streamlink/kotlin/build/test-results/test/TEST-*.xml
            spring/build/test-results/test/TEST-*.xml
            util/build/test-results/test/TEST-*.xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v7
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: false

  docs:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore build artifacts
        uses: actions/cache@v6
        with:
          path: |
            */build
          key: ${{ github.ref_name }}-build-${{ github.sha }}

      - name: Generate documentation
        run: ./gradlew dokkaGenerate
        env:
          CAPLIN_USERNAME: ${{ secrets.CAPLIN_USERNAME }}
          CAPLIN_PASSWORD: ${{ secrets.CAPLIN_PASSWORD }}

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: api-docs/build/dokka/html

  pages:
    needs:
      - test
      - docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download documentation
        uses: actions/download-artifact@v8
        with:
          name: documentation
          path: api-docs/build/dokka/html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'api-docs/build/dokka/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish libraries
        run: ./gradlew --no-configuration-cache publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CAPLIN_USERNAME: ${{ secrets.CAPLIN_USERNAME }}
          CAPLIN_PASSWORD: ${{ secrets.CAPLIN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: "BD2A1230"
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SONATYPE_GPG_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SONATYPE_GPG_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_PASSWORD }}